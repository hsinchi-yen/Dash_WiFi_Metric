services:
  postgres:
    image: postgres:16-alpine
    container_name: wifitest-db
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=120
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=512MB
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_DB: wifitest
      POSTGRES_USER: qc
      POSTGRES_PASSWORD: qcpass
    volumes:
      - ${STORAGE_PATH:-/mnt/md127/WIFI_YFP_DashBoard}/docker-data/pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qc -d wifitest"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.0.0
    container_name: wifitest-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ${STORAGE_PATH:-/mnt/md127/WIFI_YFP_DashBoard}/docker-data/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./api
    container_name: wifitest-api
    restart: unless-stopped
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    environment:
      DATABASE_URL: postgresql://qc:qcpass@postgres/wifitest
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./logs:/app/logs          # mount your log folder here
      - ./WiFiTestLogs:/app/WiFiTestLogs
      - ${STORAGE_PATH:-/mnt/md127/WIFI_YFP_DashBoard}/docker-data/app-logs:/app/runtime-logs
      - ./api/app.py:/app/app.py
      - ./log_parser.py:/app/log_parser.py
      - ./wifi_dashboard.html:/app/wifi_dashboard.html
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

# ── Usage ──────────────────────────────────────────────────────────────────────
# 1. Start stack:        docker-compose up -d
# 2. Init schema:        (auto-applied on first postgres start)
# 3. Batch ingest:       docker exec wifitest-api python log_parser.py /app/logs --dsn postgresql://qc:qcpass@postgres/wifitest
# 4. Open dashboard:     http://localhost:3000  (admin / admin)
# 5. Add data source:    Grafana > Connections > PostgreSQL > host=postgres:5432 db=wifitest
# 6. Upload GUI:         Open wifi_dashboard.html in browser (connect to API at :8000)
